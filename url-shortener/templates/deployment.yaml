apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "url-shortener.fullname" . }}
  labels:
    {{- include "url-shortener.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "url-shortener.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "url-shortener.labels" . | nindent 8 }}
    spec:
      {{- if .Values.mysql.internal }}
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "url-shortener.fullname" . }}-mysql 3306; do
                echo "waiting for mysql..."; sleep 2
              done
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: DB_HOST
              value: {{ if .Values.mysql.internal }}{{ include "url-shortener.fullname" . }}-mysql{{ else }}{{ required "db.host is required when mysql.internal is false" .Values.db.host }}{{ end }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "url-shortener.fullname" . }}-db
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "url-shortener.fullname" . }}-db
                  key: password
            - name: DB_NAME
              value: {{ .Values.db.name }}
            - name: PUBLIC_BASE_URL
              value: {{ .Values.app.publicBaseUrl | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
